services:
  server:
    image: ${SERVER_IMAGE:-note-it-server:latest}
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-file:/data/app.db}
      CLIENT_URLS: ${CLIENT_URLS:-http://localhost:4173}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET before deploying}
    ports:
      - "${SERVER_PORT:-4000}:4000"
    volumes:
      - noteit-data:/data

  client:
    image: ${CLIENT_IMAGE:-note-it-client:latest}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-4173}:80"
    depends_on:
      server:
        condition: service_started

volumes:
  noteit-data:
    name: ${SERVER_DATA_VOLUME:-noteit-data}
