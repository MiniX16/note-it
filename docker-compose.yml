version: "3.9"

services:
  server:
    build: ./server
    environment:
      - DATABASE_URL=file:/data/app.db
      - PORT=4000
      - CLIENT_URLS=http://localhost:4173,http://localhost:5173,http://127.0.0.1:4173,http://127.0.0.1:5173
      - JWT_SECRET=change-me
    ports:
      - "4000:4000"
    volumes:
      - ./data:/data

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:4000/api
    ports:
      - "4173:80"
    depends_on:
      - server
